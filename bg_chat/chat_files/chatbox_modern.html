<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #feed::-webkit-scrollbar { width: 4px; }
        #feed::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 2px; }

        /* User & assistant messages */
        .message {
            max-width: 92%;
            display: flex;
            flex-direction: column;
        }

        .message-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .user-message { align-self: flex-end; align-items: flex-end; }
        .user-message .message-label { color: #3a9fbf; }
        .user-message .message-text {
            color: #ffffff;
            background: #1a3a5c;
        }

        .assistant-message { align-self: flex-start; align-items: flex-start; }
        .assistant-message .message-label { color: #2ecc71; }
        .assistant-message .message-text {
            color: #d4f0d4;
            background: #11201a;
            border-left: 3px solid #2ecc71;
        }

        .infeasible-message { align-self: flex-start; align-items: flex-start; }
        .infeasible-message .message-label { color: #e67e22; }
        .infeasible-message .message-text {
            color: #f0b27a;
            background: #1f1611;
            border-left: 3px solid #e67e22;
        }

        /* Agent intermediate entries (think / action / info) */
        .entry {
            font-size: 12px;
            line-height: 1.4;
            padding: 6px 10px;
            border-radius: 6px;
            max-width: 92%;
            align-self: flex-start;
        }

        .entry.action {
            background: #11201a;
            border-left: 3px solid #2ecc71;
            color: #7dcea0;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .entry.error {
            background: #201111;
            border-left: 3px solid #e74c3c;
            color: #f1948a;
        }

        .entry.step {
            background: transparent;
            border: none;
            color: #4a5a7a;
            font-size: 11px;
            padding: 2px 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Streaming/finalized thinking */
        .entry.think {
            background: #111d30;
            border-left: 3px solid #3a7bd5;
            color: #8ab4f0;
        }

        .entry.think summary {
            cursor: pointer;
            font-size: 12px;
            color: #4a6a8a;
            user-select: none;
            outline: none;
            padding: 2px 0;
            list-style: none;
        }

        .entry.think summary::-webkit-details-marker { display: none; }

        .entry.think summary::before {
            content: '▶';
            display: inline-block;
            font-size: 9px;
            margin-right: 6px;
            transition: transform 0.15s;
        }

        .entry.think details[open] > summary::before {
            transform: rotate(90deg);
        }

        .entry.think summary .token-count {
            color: #3a7bd5;
            font-weight: 600;
        }

        .entry.think summary .spinner {
            display: inline-block;
            animation: pulse 1s infinite;
            margin-right: 4px;
            color: #3a7bd5;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .entry.think .stream-content {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #1a2540;
            white-space: pre-wrap;
            font-size: 12px;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
            color: #8ab4f0;
        }

        .entry.think .stream-content::-webkit-scrollbar { width: 4px; }
        .entry.think .stream-content::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 2px; }

        /* --- Input area --- */
        .chat-input-area {
            padding: 12px 16px;
            background: #0d1525;
            border-top: 1px solid #1a2540;
            flex-shrink: 0;
        }

        .chat-input-area form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-box {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            background: #141e33;
            color: #e0e0e0;
            border: 1px solid #1a2540;
            border-radius: 8px;
            outline: none;
            resize: none;
            font-size: 14px;
            font-family: inherit;
            min-height: 42px;
            max-height: 120px;
            overflow-y: auto;
        }

        .input-box::placeholder { color: #4a5a7a; }
        .input-box:focus { border-color: #3a7bd5; }

        .submit-button {
            padding: 10px 20px;
            background: #1a3a5c;
            color: #8ab4f0;
            border: 1px solid #2a4a7a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.15s;
        }

        .submit-button:hover { background: #2a4a7a; }

        .control-buttons {
            display: flex;
            gap: 6px;
        }

        .control-btn {
            padding: 10px 14px;
            border: 1px solid #2a4a7a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.15s;
        }

        .pause-btn {
            background: #3a2a1a;
            color: #f0b27a;
            border-color: #5a3a1a;
        }
        .pause-btn:hover { background: #4a3a2a; }
        .pause-btn.paused {
            background: #1a3a2a;
            color: #7dcea0;
            border-color: #2a5a3a;
        }
        .pause-btn.paused:hover { background: #2a4a3a; }

        .restart-btn {
            background: #2a1a1a;
            color: #f1948a;
            border-color: #4a2a2a;
        }
        .restart-btn:hover { background: #3a2a2a; }
    </style>
</head>

<body>
    <div id="feed"></div>

    <div class="chat-input-area">
        <form id="chatForm">
            <textarea class="input-box" id="inputBox" placeholder="Type a message..." rows="1"></textarea>
            <button type="submit" class="submit-button">Send</button>
            <div class="control-buttons">
                <button type="button" class="control-btn pause-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
                <button type="button" class="control-btn restart-btn" id="restartBtn" onclick="doRestart()">Restart</button>
            </div>
        </form>
    </div>

    <script>
        var USER_MESSAGE_RECEIVED = false;
        var AGENT_PAUSED = false;
        var AGENT_RESTART = false;

        const feed = document.getElementById('feed');

        function scrollFeedToBottom() {
            feed.scrollTop = feed.scrollHeight;
        }

        function togglePause() {
            AGENT_PAUSED = !AGENT_PAUSED;
            const btn = document.getElementById('pauseBtn');
            if (AGENT_PAUSED) {
                btn.textContent = 'Resume';
                btn.classList.add('paused');
                addChatMessage('info', '', 'Agent paused.');
            } else {
                btn.textContent = 'Pause';
                btn.classList.remove('paused');
                addChatMessage('info', '', 'Agent resumed.');
            }
        }

        function doRestart() {
            AGENT_RESTART = true;
            AGENT_PAUSED = false;
            const btn = document.getElementById('pauseBtn');
            btn.textContent = 'Pause';
            btn.classList.remove('paused');
            addChatMessage('info', '', 'Restarting agent...');
        }

        function escapeHtml(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function nl2br(s) { return s.replace(/\n/g, "<br>"); }

        function addChatMessage(role, timeString, msg) {
            // Static thinking (legacy path, kept for completeness)
            if (role === "think") {
                const entry = document.createElement('details');
                entry.className = 'entry think';
                entry.innerHTML =
                    '<summary>Thought</summary>' +
                    '<div class="stream-content">' + nl2br(escapeHtml(msg)) + '</div>';
                feed.appendChild(entry);
                scrollFeedToBottom();
                return;
            }

            if (role === "info") {
                const entry = document.createElement('div');
                const lower = msg.toLowerCase();
                if (lower.startsWith("action:")) {
                    entry.className = 'entry action';
                } else if (lower.includes("error")) {
                    entry.className = 'entry error';
                } else {
                    entry.className = 'entry step';
                }
                entry.innerHTML = nl2br(escapeHtml(msg));
                feed.appendChild(entry);
                scrollFeedToBottom();
                return;
            }

            const container = document.createElement('div');
            container.className = 'message';

            const label = document.createElement('div');
            label.className = 'message-label';

            const text = document.createElement('div');
            text.className = 'message-text';

            switch (role) {
                case "user":
                    container.classList.add('user-message');
                    label.textContent = timeString + ' \u00b7 You';
                    text.innerHTML = nl2br(escapeHtml(msg));
                    break;
                case "user_image":
                    container.classList.add('user-message');
                    label.textContent = timeString + ' \u00b7 You';
                    text.innerHTML = '<img src="' + msg + '" style="max-width:100%">';
                    break;
                case "assistant":
                    container.classList.add('assistant-message');
                    label.textContent = timeString + ' \u00b7 Agent';
                    text.innerHTML = nl2br(escapeHtml(msg));
                    break;
                case "infeasible":
                    container.classList.add('infeasible-message');
                    label.textContent = timeString + ' \u00b7 Agent (cannot complete)';
                    text.innerHTML = nl2br(escapeHtml(msg));
                    break;
                default:
                    return;
            }

            container.appendChild(label);
            container.appendChild(text);
            feed.appendChild(container);
            scrollFeedToBottom();

            if (role === "user") {
                USER_MESSAGE_RECEIVED = true;
            }
        }

        var _streamEntry = null;
        var _streamTokenCount = 0;

        function startStreamingThink() {
            _streamTokenCount = 0;

            const wrapper = document.createElement('div');
            wrapper.className = 'entry think';

            const details = document.createElement('details');
            details.open = false;

            const summary = document.createElement('summary');
            summary.innerHTML = '<span class="spinner">&#9679;</span> Thinking... <span class="token-count">0 tokens</span>';

            const content = document.createElement('div');
            content.className = 'stream-content';

            details.appendChild(summary);
            details.appendChild(content);
            wrapper.appendChild(details);
            feed.appendChild(wrapper);
            scrollFeedToBottom();

            _streamEntry = { wrapper, summary, content, details };
        }

        function appendStreamingToken(token) {
            if (!_streamEntry) return;
            _streamTokenCount++;
            _streamEntry.content.textContent += token;
            _streamEntry.summary.innerHTML =
                '<span class="spinner">&#9679;</span> Thinking... <span class="token-count">' + _streamTokenCount + ' tokens</span>';
            if (_streamEntry.details.open) {
                _streamEntry.content.scrollTop = _streamEntry.content.scrollHeight;
            }
            scrollFeedToBottom();
        }

        function finalizeStreamingThink() {
            if (!_streamEntry) return;
            _streamEntry.summary.innerHTML =
                'Thought <span class="token-count">(' + _streamTokenCount + ' tokens)</span>';
            _streamEntry = null;
        }

        if (typeof send_user_message !== 'function') {
            function send_user_message(msg) {}
        }

        const inputBox = document.getElementById('inputBox');

        async function send_msg(msg) {
            if (msg.trim()) {
                const strings = await send_user_message(msg);
                addChatMessage(strings[0], strings[1], strings[2]);
                inputBox.value = '';
                inputBox.style.height = 'auto';
            }
        }

        inputBox.addEventListener('input', () => {
            inputBox.style.height = 'auto';
            inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
        });

        inputBox.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send_msg(inputBox.value);
            }
        };

        document.getElementById('chatForm').onsubmit = function(e) {
            e.preventDefault();
            send_msg(inputBox.value);
            return false;
        };
    </script>
</body>
</html>

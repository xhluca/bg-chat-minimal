<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Chat</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div id="feed"></div>
    <div class="chat-input-area">
        <form id="chatForm">
            <textarea class="input-box" id="inputBox" placeholder="Type a message..." rows="1"></textarea>
            <button type="submit" class="submit-button">Send</button>
            <div class="control-buttons">
                <button type="button" class="control-btn pause-btn" id="pauseBtn">Pause</button>
                <button type="button" class="control-btn end-btn" id="endBtn">End</button>
            </div>
        </form>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
